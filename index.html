<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pages Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
}

h1{
font-weight:600;
margin-bottom:30px;
letter-spacing:1px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
width:100%;
max-width:900px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:16px;
padding:30px;
text-align:center;
transition:all .25s ease;
cursor:pointer;
border:1px solid rgba(255,255,255,0.15);
}

.card:hover{
transform:translateY(-8px) scale(1.02);
background:rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.file{
font-size:18px;
font-weight:500;
margin-bottom:8px;
}

.open{
font-size:13px;
opacity:.7
}

footer{
margin-top:40px;
font-size:12px;
opacity:.6
}

.search{
margin-bottom:30px;
width:100%;
max-width:500px;
}

.search input{
width:100%;
padding:12px 16px;
border-radius:30px;
border:none;
outline:none;
font-size:14px;
}
</style>
</head>

<body>

<h1>HTML Pages</h1>

<div class="search">
<input type="text" id="search" placeholder="Search pages...">
</div>

<div class="grid" id="grid">

<div class="card" data-name="one" onclick="openPage('one.html')">
<div class="file">one.html</div>
<div class="open">Click to open</div>
</div>

<div class="card" data-name="two" onclick="openPage('two.html')">
<div class="file">two.html</div>
<div class="open">Click to open</div>
</div>

<div class="card" data-name="three" onclick="openPage('three.html')">
<div class="file">three.html</div>
<div class="open">Click to open</div>
</div>

</div>

<footer>
GitHub Pages Navigation
</footer>

<script>
function openPage(page){
window.location.href = page
}

const search=document.getElementById('search')
const cards=document.querySelectorAll('.card')

search.addEventListener('input',()=>{
const term=search.value.toLowerCase()

cards.forEach(card=>{
const name=card.dataset.name
if(name.includes(term)){
card.style.display='block'
}else{
card.style.display='none'
}
})
})
</script>

</body>
</html>
